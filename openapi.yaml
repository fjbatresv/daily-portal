openapi: 3.0.3

info:
  title: Daily Portal API
  description: |
    API REST del backend NestJS del Daily Portal.
    Todos los endpoints bajo /api/.
    No hay autenticación (portal personal en homelab, acceso via Cloudflare Tunnel).
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Desarrollo local (NestJS directo)
  - url: http://localhost:8090/api
    description: Desarrollo local (via nginx)

tags:
  - name: health
    description: Estado del sistema
  - name: dashboard
    description: Digest diario agregado
  - name: reminders
    description: Recordatorios del usuario

paths:

  # ─────────────────────────────────────────────────────────────
  # HEALTH
  # ─────────────────────────────────────────────────────────────

  /api/health:
    get:
      tags: [health]
      summary: Health check
      description: |
        Verifica que el backend está vivo.
        Usado por el healthcheck de Docker Compose.
      operationId: getHealth
      responses:
        '200':
          description: Sistema operativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-29T08:00:00.000Z'
                uptime: 3600

  # ─────────────────────────────────────────────────────────────
  # DASHBOARD
  # ─────────────────────────────────────────────────────────────

  /api/dashboard:
    get:
      tags: [dashboard]
      summary: Obtiene el digest diario completo
      description: |
        Agrega todas las fuentes en paralelo (Promise.allSettled).
        Las integraciones que fallen devuelven array vacío y no rompen la respuesta.
        Las fuentes con cache devuelven datos cacheados hasta que expire el TTL.
      operationId: getDailyDigest
      responses:
        '200':
          description: Digest del día actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyDigest'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/dashboard/refresh:
    post:
      tags: [dashboard]
      summary: Invalida el cache y fuerza un refresh de todas las fuentes
      description: |
        Borra las claves de Redis para todas las integraciones y
        retorna el digest recién calculado. Útil cuando el usuario
        quiere datos frescos sin esperar el TTL.
      operationId: refreshDailyDigest
      responses:
        '200':
          description: Digest recalculado con datos frescos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyDigest'

  # ─────────────────────────────────────────────────────────────
  # REMINDERS
  # ─────────────────────────────────────────────────────────────

  /api/reminders:
    get:
      tags: [reminders]
      summary: Lista recordatorios
      description: |
        Sin parámetros devuelve los recordatorios de hoy.
        Con `date` filtra por fecha específica.
        Con `all=true` devuelve todos (incluyendo completados).
      operationId: listReminders
      parameters:
        - name: date
          in: query
          required: false
          description: Fecha en formato YYYY-MM-DD. Default es hoy.
          schema:
            type: string
            format: date
            example: '2026-06-29'
        - name: all
          in: query
          required: false
          description: Si true, incluye recordatorios de todas las fechas y completados.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Lista de recordatorios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'

    post:
      tags: [reminders]
      summary: Crea un nuevo recordatorio
      operationId: createReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderDto'
            example:
              text: Enviar propuesta técnica a GTC
              date: '2026-06-30'
              priority: high
      responses:
        '201':
          description: Recordatorio creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/reminders/{id}:
    get:
      tags: [reminders]
      summary: Obtiene un recordatorio por ID
      operationId: getReminder
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Recordatorio encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Recordatorio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [reminders]
      summary: Actualiza un recordatorio (parcialmente)
      operationId: updateReminder
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderDto'
      responses:
        '200':
          description: Recordatorio actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Recordatorio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [reminders]
      summary: Elimina un recordatorio
      operationId: deleteReminder
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '204':
          description: Recordatorio eliminado
        '404':
          description: Recordatorio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/reminders/{id}/complete:
    patch:
      tags: [reminders]
      summary: Marca un recordatorio como completado
      operationId: completeReminder
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Recordatorio marcado como completado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Recordatorio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────

components:

  parameters:
    ReminderId:
      name: id
      in: path
      required: true
      description: UUID del recordatorio
      schema:
        type: string
        format: uuid
        example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4

  schemas:

    # ── Salud ──────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status, timestamp, uptime]
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          description: Segundos desde que inició el proceso

    # ── Errores ────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string
          example: Bad Request

    # ── Tipos base ─────────────────────────────────────────────

    Priority:
      type: string
      enum: [high, medium, low]

    PRStatus:
      type: string
      enum: [open, merged, closed, draft]

    CheckStatus:
      type: string
      enum: [success, failure, pending, error]

    # ── Entidades del digest ───────────────────────────────────

    JiraTask:
      type: object
      required: [id, key, summary, status, priority, url]
      properties:
        id:
          type: string
        key:
          type: string
          example: TEMP-123
        summary:
          type: string
          example: Implementar autenticación OAuth
        status:
          type: string
          example: In Progress
        priority:
          type: string
          example: High
        url:
          type: string
          format: uri

    GitHubPR:
      type: object
      required: [id, title, url, repo, status, isDraft, hasNewComments, checkStatus, hasConflicts, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
          format: uri
        repo:
          type: string
          example: org/api-gateway
        status:
          $ref: '#/components/schemas/PRStatus'
        isDraft:
          type: boolean
        hasNewComments:
          type: boolean
          description: Tiene comentarios agregados desde la última revisión
        checkStatus:
          $ref: '#/components/schemas/CheckStatus'
        hasConflicts:
          type: boolean
          description: El PR tiene conflictos de merge
        updatedAt:
          type: string
          format: date-time

    CalendarEvent:
      type: object
      required: [id, title, startTime, endTime, calendarId, calendarName, isAllDay]
      properties:
        id:
          type: string
        title:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        calendarId:
          type: string
        calendarName:
          type: string
        isAllDay:
          type: boolean
        meetUrl:
          type: string
          format: uri
          nullable: true

    SlackMention:
      type: object
      required: [ts, channelName, senderName, text, permalink]
      properties:
        ts:
          type: string
          description: Timestamp único del mensaje en Slack
        channelName:
          type: string
          example: backend
        senderName:
          type: string
        text:
          type: string
        permalink:
          type: string
          format: uri

    TodoItem:
      type: object
      required: [source, priority, text]
      properties:
        source:
          type: string
          enum: [jira, github, calendar, slack, reminder]
        priority:
          $ref: '#/components/schemas/Priority'
        text:
          type: string
        url:
          type: string
          format: uri
          nullable: true
        dueTime:
          type: string
          description: Hora del evento si aplica (HH:MM)
          nullable: true

    # ── DailyDigest ────────────────────────────────────────────

    DailyDigest:
      type: object
      required: [date, generatedAt, todoList, tasks, prs, events, slackMentions, reminders]
      properties:
        date:
          type: string
          format: date
          example: '2026-06-29'
        generatedAt:
          type: string
          format: date-time
        todoList:
          type: array
          description: Lista priorizada generada automáticamente de todas las fuentes
          items:
            $ref: '#/components/schemas/TodoItem'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/JiraTask'
        prs:
          type: array
          items:
            $ref: '#/components/schemas/GitHubPR'
        events:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEvent'
        slackMentions:
          type: array
          items:
            $ref: '#/components/schemas/SlackMention'
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/Reminder'

    # ── Recordatorios ──────────────────────────────────────────

    Reminder:
      type: object
      required: [id, text, date, priority, completed, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        text:
          type: string
          example: Enviar propuesta técnica a GTC
        date:
          type: string
          format: date
          example: '2026-06-30'
        priority:
          $ref: '#/components/schemas/Priority'
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateReminderDto:
      type: object
      required: [text, date]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
        date:
          type: string
          format: date
          description: Fecha YYYY-MM-DD para la que aplica el recordatorio
        priority:
          $ref: '#/components/schemas/Priority'
          default: medium

    UpdateReminderDto:
      type: object
      description: Todos los campos son opcionales (PATCH parcial)
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
        date:
          type: string
          format: date
        priority:
          $ref: '#/components/schemas/Priority'
        completed:
          type: boolean
