name: CodeRabbit Config

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.coderabbit.yaml'
      - '.github/workflows/coderabbit.yml'
  push:
    branches: [main, develop]
    paths:
      - '.coderabbit.yaml'
      - '.github/workflows/coderabbit.yml'

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate CodeRabbit config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate YAML
        run: ruby -e "require 'yaml'; YAML.load_file('.coderabbit.yaml')"
