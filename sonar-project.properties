# SonarCloud configuration
# https://sonarcloud.io → your project → Information tab → Project Key & Organization

sonar.projectKey=fjbatresv_daily-portal
sonar.organization=fjbatresv

sonar.projectName=Daily Portal
sonar.projectVersion=0.1.0

# Source code
sonar.sources=backend/src,frontend/src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/migrations/**,\
  db/schema.sql

# Test files
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Coverage (generated by backend Jest with lcov reporter)
# The backend package.json Jest config must include:
#   "coverageReporters": ["lcov", "text-summary"]
#   "coverageDirectory": "coverage"
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info

# TypeScript
sonar.javascript.node.maxspace=4096

# Encoding
sonar.sourceEncoding=UTF-8
