services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVE_STATIC: ${SERVE_STATIC:-true}
      SQLITE_PATH: /app/data/portal.db
      REDIS_URL: redis://redis:6379
      TZ: ${TZ:-America/Guatemala}
    env_file:
      - .env
    ports:
      - '${HOST_PORT:-8090}:3000'
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8-alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data:
